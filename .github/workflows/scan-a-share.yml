name: Scan All A Shares

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/scan-a-share.yml"
      - "scripts/**"
      - "tests/**"
  schedule:
    - cron: "45 15 * * 1-5"
      timezone: "Asia/Shanghai"

permissions:
  contents: write

concurrency:
  group: all-a-share-scan
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Scan Shanghai, Shenzhen and Beijing A shares
        run: python scripts/scan_market.py --output data/candidates.json --top 30

      - name: Validate candidate feed
        run: python scripts/validate_feed.py data/candidates.json

      - name: Publish latest successful feed
        run: |
          git add data/candidates.json
          if git diff --cached --quiet; then
            echo "Candidate feed is unchanged"
            exit 0
          fi
          git config user.name "AStockAI Market Bot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "Update full A-share candidate feed"
          git push
